schema: "paperclip/v1"
agents:
  ai-backend:
    adapter:
      type: "claude_local"
    inputs:
      env:
        GH_TOKEN:
          description: "Optional default for GH_TOKEN on agent ai-backend"
          kind: "secret"
          default: ""
          requirement: "optional"
  ai-ml:
    adapter:
      type: "claude_local"
    inputs:
      env:
        GH_TOKEN:
          description: "Optional default for GH_TOKEN on agent ai-ml"
          kind: "secret"
          default: ""
          requirement: "optional"
  cdo:
    adapter:
      type: "claude_local"
    inputs:
      env:
        GH_TOKEN:
          description: "Optional default for GH_TOKEN on agent cdo"
          kind: "secret"
          default: ""
          requirement: "optional"
  ceo:
    role: "ceo"
    adapter:
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 300
    permissions:
      canCreateAgents: true
    inputs:
      env:
        GH_TOKEN:
          description: "Optional default for GH_TOKEN on agent ceo"
          kind: "secret"
          default: ""
          requirement: "optional"
  cloud:
    adapter:
      type: "claude_local"
    inputs:
      env:
        GH_TOKEN:
          description: "Optional default for GH_TOKEN on agent cloud"
          kind: "secret"
          default: ""
          requirement: "optional"
  cmo:
    role: "cmo"
    icon: "target"
    capabilities: "Owns go-to-market, brand, developer relations, and product marketing execution."
    adapter:
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 300
    inputs:
      env:
        GH_TOKEN:
          description: "Optional default for GH_TOKEN on agent cmo"
          kind: "secret"
          default: ""
          requirement: "optional"
  cto:
    role: "cto"
    icon: "crown"
    capabilities: "Owns technical strategy, engineering execution, technical hiring, and roadmap decomposition into shippable tasks."
    adapter:
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 300
    inputs:
      env:
        GH_TOKEN:
          description: "Optional default for GH_TOKEN on agent cto"
          kind: "secret"
          default: ""
          requirement: "optional"
  desktop:
    adapter:
      type: "claude_local"
    inputs:
