  security:
    adapter:
      type: "claude_local"
    inputs:
      env:
        GH_TOKEN:
          description: "Optional default for GH_TOKEN on agent security"
          kind: "secret"
          default: ""
          requirement: "optional"
projects:
  vectora:
    color: "#eab308"
    status: "in_progress"
    workspaces:
      vectora:
        name: "Vectora"
        defaultRef: "master"
        isPrimary: true
        repoRef: "master"
        repoUrl: "https://github.com/Kaffyn/Vectora"
        sourceType: "git_repo"
        visibility: "default"
sidebar:
