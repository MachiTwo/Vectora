        GH_TOKEN:
          description: "Optional default for GH_TOKEN on agent devops"
          kind: "secret"
          default: ""
          requirement: "optional"
  devrel:
    adapter:
      type: "claude_local"
    inputs:
      env:
        GH_TOKEN:
          description: "Optional default for GH_TOKEN on agent devrel"
          kind: "secret"
          default: ""
          requirement: "optional"
  frontend-engineer:
    adapter:
      type: "claude_local"
    inputs:
      env:
        GH_TOKEN:
          description: "Optional default for GH_TOKEN on agent frontend-engineer"
          kind: "secret"
