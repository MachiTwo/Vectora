name: Integrations CI

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      release_kind:
        required: true
        type: string
      run_all:
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate Integrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report build context
        run: |
          echo "module=integrations"
          echo "version=${{ inputs.version }}"
          echo "release_kind=${{ inputs.release_kind }}"
          echo "run_all=${{ inputs.run_all }}"

      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit

      - name: Run pre-commit
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- vectora-integrations)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No tracked files in vectora-integrations/"
            exit 0
          fi

          pre-commit run --files "${files[@]}" --show-diff-on-failure --color always

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Node package checks
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t package_files < <(find vectora-integrations -name package.json -print)
          if [[ "${#package_files[@]}" -eq 0 ]]; then
            echo "No Node packages found under vectora-integrations/"
            exit 0
          fi

          for pkg in "${package_files[@]}"; do
            pkg_dir="$(dirname "${pkg}")"
            echo "Checking Node package: ${pkg_dir}"
            pushd "${pkg_dir}" >/dev/null
            npm ci
            npm test --if-present
            npm run build --if-present
            popd >/dev/null
          done
