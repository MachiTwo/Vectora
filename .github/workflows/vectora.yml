name: Vectora App CI

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      release_kind:
        required: true
        type: string
      run_all:
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate Vectora
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report build context
        run: |
          echo "module=vectora"
          echo "version=${{ inputs.version }}"
          echo "release_kind=${{ inputs.release_kind }}"
          echo "run_all=${{ inputs.run_all }}"

      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit

      - name: Run pre-commit
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- vectora)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No tracked files in vectora/"
            exit 0
          fi

          pre-commit run --files "${files[@]}" --show-diff-on-failure --color always

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go module checks
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t go_mods < <(find vectora -name go.mod -print)
          if [[ "${#go_mods[@]}" -eq 0 ]]; then
            echo "No Go modules found under vectora/"
            exit 0
          fi

          for mod in "${go_mods[@]}"; do
            mod_dir="$(dirname "${mod}")"
            echo "Checking Go module: ${mod_dir}"
            pushd "${mod_dir}" >/dev/null
            go test ./...
            go build ./...
            popd >/dev/null
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Node module checks
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t package_files < <(find vectora -name package.json -print)
          if [[ "${#package_files[@]}" -eq 0 ]]; then
            echo "No Node packages found under vectora/"
            exit 0
          fi

          for pkg in "${package_files[@]}"; do
            pkg_dir="$(dirname "${pkg}")"
            echo "Checking Node package: ${pkg_dir}"
            pushd "${pkg_dir}" >/dev/null
            npm ci
            npm test --if-present
            npm run build --if-present
            popd >/dev/null
          done
