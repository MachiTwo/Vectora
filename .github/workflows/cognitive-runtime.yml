name: Cognitive Runtime CI

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      release_kind:
        required: true
        type: string
      run_all:
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate Cognitive Runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report build context
        run: |
          echo "module=cognitive-runtime"
          echo "version=${{ inputs.version }}"
          echo "release_kind=${{ inputs.release_kind }}"
          echo "run_all=${{ inputs.run_all }}"

      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit

      - name: Run pre-commit
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- vectora-cognitive-runtime)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No tracked files in vectora-cognitive-runtime/"
            exit 0
          fi

          pre-commit run --files "${files[@]}" --show-diff-on-failure --color always

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python sanity checks
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t py_files < <(find vectora-cognitive-runtime scripts -name '*.py' -print)
          if [[ "${#py_files[@]}" -eq 0 ]]; then
            echo "No Python files found to validate"
            exit 0
          fi

          python -m compileall "${py_files[@]}"
