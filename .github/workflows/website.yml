name: Website CI

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      release_kind:
        required: true
        type: string
      run_all:
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report build context
        run: |
          echo "module=website"
          echo "version=${{ inputs.version }}"
          echo "release_kind=${{ inputs.release_kind }}"
          echo "run_all=${{ inputs.run_all }}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: vectora-website/go.mod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.0"
          extended: true

      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit

      - name: Run pre-commit
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- vectora-website)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No tracked files in vectora-website/"
            exit 0
          fi

          pre-commit run --files "${files[@]}" --show-diff-on-failure --color always

      - name: Build website
        working-directory: vectora-website
        run: hugo --gc --minify
