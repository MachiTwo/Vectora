default_language_version:
  python: python3

default_stages: [pre-commit]
minimum_pre_commit_version: 3.0.0

exclude: |
  (?x)^(
    \.git/.*|
    .*\.pdf$|
    .*\.lock$|
    package-lock\.json|
    yarn\.lock|
    go\.sum|
    coverage\..*|
    \.env.*|
    vectora-website/(public|resources|static|temp)/.*
  )$

repos:
  # ==========================================
  # Basic File Validation
  # ==========================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        args: [--markdown-linebreak-ext=md]
        stages: [pre-commit]
      - id: end-of-file-fixer
        name: Fix End of File
        stages: [pre-commit]
      - id: check-yaml
        name: Validate YAML
        args: ["--allow-multiple-documents", "--unsafe"]
        stages: [pre-commit]
      - id: check-json
        name: Validate JSON
        stages: [pre-commit]
      - id: check-toml
        name: Validate TOML
        stages: [pre-commit]
      - id: check-merge-conflict
        name: Check for Merge Conflicts
        stages: [pre-commit]
      - id: check-added-large-files
        name: Check for Large Files
        args: ["--maxkb=5000"]
        stages: [pre-commit]
      - id: detect-private-key
        name: Detect Private Keys
        stages: [pre-commit]

  # ==========================================
  # Go Validation (vectora only)
  # ==========================================
  - repo: local
    hooks:
      - id: gofmt-vectora
        name: gofmt (vectora)
        entry: gofmt -w
        language: system
        files: ^vectora/.*\.go$

  - repo: https://github.com/golangci/golangci-lint
    rev: v1.62.2
    hooks:
      - id: golangci-lint
        name: GolangCI-Lint (vectora)
        files: ^vectora/.*\.go$

  # ==========================================
  # Python Validation (scripts and cognitive runtime)
  # ==========================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        name: Ruff Lint (Python)
        args: [--fix, --line-length=100]
        files: ^(scripts|vectora-cognitive-runtime)/.*\.py$
      - id: ruff-format
        name: Ruff Format (Python)
        files: ^(scripts|vectora-cognitive-runtime)/.*\.py$

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort Python Imports
        args: ["--profile=black", "--line-length=100"]
        files: ^(scripts|vectora-cognitive-runtime)/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        name: Mypy (Python Static Analysis)
        files: ^(scripts|vectora-cognitive-runtime)/.*\.py$
        types_or: [text]
        additional_dependencies: [types-PyYAML]

  # ==========================================
  # TypeScript / JavaScript Validation (vectora and integrations)
  # ==========================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Prettier (vectora + integrations)
        args: ["--write"]
        files: ^(vectora|vectora-integrations)/.*\.(ts|tsx|js|jsx|mjs|cjs|json)$
        types_or: [text]

  # ==========================================
  # Hugo / Website Validation
  # ==========================================
  - repo: local
    hooks:
      - id: generate-search-index
        name: Generate Search Index
        entry: python vectora-website/scripts/generate_index.py
        language: system
        files: ^vectora-website/content/.*\.md$
        pass_filenames: false
      - id: generate-sitemap
        name: Generate Sitemap
        entry: python vectora-website/scripts/generate_sitemap.py
        language: system
        files: ^vectora-website/content/.*\.md$
        pass_filenames: false

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        name: MarkdownLint (website)
        args: ["--config", "vectora-website/.markdownlint.json", "--fix"]
        files: ^vectora-website/content/.*\.md$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Prettier (markdown + yaml)
        args: ["--write"]
        files: \.(md|yaml|yml|css)$
        types_or: [text]

ci:
  autofix_commit_msg: "chore: auto fixes from pre-commit hooks"
  autofix_prs: false
  autoupdate_branch: ""
  skip: []
  submodules: false
