baseURL = 'https://vectora.github.io/'
languageCode = 'en'
defaultContentLanguage = 'en'
title = 'Vectora'
enableEmoji = true
disableKinds = ["sitemap"]

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[languages]
  [languages.en]
    languageName = 'English'
    languageCode = 'en'
    weight = 1
    title = 'Vectora'
    [languages.en.menu]
      [[languages.en.menu.main]]
        name = 'GitHub'
        url = 'https://github.com/Kaffyn/Vectora'
        weight = 1
        [languages.en.menu.main.params]
          icon = 'github'
      [[languages.en.menu.main]]
        name = 'Theme'
        weight = 2
        [languages.en.menu.main.params]
          type = 'theme-toggle'
      [[languages.en.menu.main]]
        name = 'Search'
        weight = 3
        [languages.en.menu.main.params]
          type = 'search'

  [languages.pt-br]
    languageName = 'Português'
    languageCode = 'pt-br'
    weight = 2
    [languages.pt-br.menu]
      [[languages.pt-br.menu.main]]
        name = 'GitHub ↗'
        url = 'https://github.com/Kaffyn/Vectora'
        weight = 1
        [languages.pt-br.menu.main.params]
          icon = 'github'
      [[languages.pt-br.menu.main]]
        name = 'Tema'
        weight = 2
        [languages.pt-br.menu.main.params]
          type = 'theme-toggle'
      [[languages.pt-br.menu.main]]
        name = 'Buscar'
        weight = 3
        [languages.pt-br.menu.main.params]
          type = 'search'

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[params]
  [params.navbar]
    displayTitle = true
    displayLogo = true
    [params.navbar.logo]
      path = "images/logo.jpg"
      link = "/"

  [params.page]
    [params.page.contextMenu]
      enable = true
      display = true
      links = [
        { name = "Compartilhar no X", icon = "x-twitter", url = "https://x.com/intent/tweet?url={url}&text={title}" },
        { name = "Compartilhar no LinkedIn", icon = "linkedin", url = "https://www.linkedin.com/sharing/share-offsite/?url={url}" }
      ]

  [params.footer]
    displayCopyright = true
    displayPoweredBy = true

  [params.theme]
    default = 'light'

  favicon = "favicon.ico"

  [params.author]
    name = 'Vectora Contributors'
    github = 'Kaffyn/Vectora'

  description = 'Vectora - Documentação oficial. Vectora é um sub-agent de IA em Go com suporte a integração cloud, language system, e arquitetura de multi-região Kubernetes.'

  [params.opengraph]
    image = '/images/logo.jpg'
    locale = 'pt_BR'

  [params.seo]
    keywords = 'Vectora, Go, Vector Search, RAG, Context Engine, MCP, AI, Sub-Agent, Code Search'
    robots = 'index, follow'
